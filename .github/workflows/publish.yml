name: publish

on:
  push:
    branches:
      - main

# No cancel-in-progress on purpose: cancelling a run mid-publish could leave a
# partial release (some of the 6 fixed-group packages published, others not).
# Queue overlapping runs instead of cancelling them.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Manages the "Version Packages" PR on every push. When changesets are present
  # it opens/updates the PR and stops. When the PR has been merged (no changesets
  # left) hasChangesets is "false", which gates the build + publish jobs below.
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit + push the Version PR branch
      pull-requests: write # open/update the Version Packages PR
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.3

      - run: bun install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: bun run ci:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build each binary on its own native OS so bun build --compile embeds the
  # correct platform-native libs (OpenTUI's per-platform packages carry
  # libopentui), then run it headlessly before it goes anywhere near npm.
  # Only darwin-x64 has no free native runner (GitHub retired the Intel image);
  # it is cross-compiled on the arm64 mac after fetching its native lib, and
  # skips the smoke test.
  build:
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            smoke: true
          - target: linux-arm64
            runner: ubuntu-24.04-arm # free native arm64 runner (public repo)
            smoke: true
          - target: darwin-x64
            runner: macos-latest
            smoke: false # cross-compiled from arm64 — no free Intel runner
          - target: darwin-arm64
            runner: macos-latest
            smoke: true
          - target: win32-x64
            runner: windows-latest
            smoke: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # build job never pushes; don't leave the token in .git/config

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.3

      - run: bun install

      # darwin-x64 has no free native runner, so it is cross-compiled on the
      # arm64 mac. bun install only fetched the host's OpenTUI native package, so
      # fetch the x64 one (it carries libopentui) before compiling — otherwise
      # `bun build --compile` cannot resolve @opentui/core-darwin-x64. Uses
      # npm pack (not bun add) so it doesn't rewrite the lockfile.
      - name: Fetch cross-target native lib (darwin-x64)
        if: matrix.target == 'darwin-x64'
        shell: bash
        run: |
          ver=$(cd packages/cli && bun -e "console.log(require('@opentui/core/package.json').version)")
          tmp=$(mktemp -d)
          npm pack "@opentui/core-darwin-x64@${ver}" --pack-destination "$tmp"
          tar -xzf "$tmp"/opentui-core-darwin-x64-*.tgz -C "$tmp"
          mkdir -p node_modules/@opentui/core-darwin-x64
          cp -R "$tmp"/package/. node_modules/@opentui/core-darwin-x64/
          echo "Installed @opentui/core-darwin-x64@${ver} for cross-compile"

      - name: Build ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
        run: bun run scripts/build.ts --target="$TARGET"

      - name: Smoke test (native targets only)
        if: matrix.smoke
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          bin="packages/cli-${TARGET}/bin/knightcode"
          if [ "$TARGET" = "win32-x64" ]; then bin="$bin.exe"; fi
          echo "→ knightcode --version"
          "$bin" --version
          echo "→ knightcode doctor"
          "$bin" doctor

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.target }}
          path: packages/cli-${{ matrix.target }}/bin/
          if-no-files-found: error
          retention-days: 1

  # Reassemble the tested binaries into their package folders, validate the full
  # npm install path (pack-test), then publish every package Changesets considers
  # unpublished. Publishes the exact artifacts the build job produced.
  publish:
    needs: [version, build]
    if: needs.version.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tags + create the GitHub Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false # tags are pushed with an explicit token below

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Restore binaries into platform packages
        shell: bash
        run: |
          for dir in artifacts/cli-*; do
            target="${dir##*/cli-}"
            dest="packages/cli-${target}/bin"
            mkdir -p "$dest"
            cp -r "${dir}/." "$dest/"
          done
          # Artifact upload drops the mode bit; npm pack/publish reads it from
          # disk, so re-mark the POSIX binaries (not knightcode.exe) executable.
          chmod +x packages/cli-*/bin/knightcode 2>/dev/null || true
          ls -la packages/cli-*/bin

      - name: pack-test + publish
        run: bun run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" --tags

      # One clean GitHub Release per version for the main package (not the 5
      # platform packages). Body = the CHANGELOG.md section Changesets wrote.
      # Idempotent: skips if the release already exists (re-runs / no-op pushes).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          tag="@knightcodeai/cli@${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release for $tag already exists — nothing to do."
            exit 0
          fi
          notes=$(awk -v ver="$version" '
            $0 == "## " ver { flag = 1; next }
            /^## / && flag { exit }
            flag { print }
          ' packages/cli/CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="Release ${version}."
          fi
          printf '%s\n' "$notes" | gh release create "$tag" --title "v${version}" --notes-file -
