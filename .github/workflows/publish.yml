name: publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push the Version PR branch + tags
  pull-requests: write # open/update the Version Packages PR

jobs:
  # Manages the "Version Packages" PR on every push. When changesets are present
  # it opens/updates the PR and stops. When the PR has been merged (no changesets
  # left) hasChangesets is "false", which gates the build + publish jobs below.
  version:
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - run: bun install --frozen-lockfile

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build each binary on its own native OS so bun build --compile embeds the
  # correct platform-native libs (OpenTUI ships per-platform native packages),
  # then run the binary headlessly before it is allowed anywhere near npm.
  # linux-arm64 has no native GitHub runner, so it is cross-compiled and skips
  # the smoke test (the only target shipped without native execution).
  build:
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            smoke: true
          - target: linux-arm64
            runner: ubuntu-latest
            smoke: false # cross-compiled from x64 — cannot execute here
          - target: darwin-x64
            runner: macos-13
            smoke: true
          - target: darwin-arm64
            runner: macos-latest
            smoke: true
          - target: win32-x64
            runner: windows-latest
            smoke: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run scripts/build.ts --target=${{ matrix.target }}

      - name: Smoke test (native targets only)
        if: matrix.smoke
        shell: bash
        run: |
          bin="packages/cli-${{ matrix.target }}/bin/knightcode"
          if [ "${{ matrix.target }}" = "win32-x64" ]; then bin="$bin.exe"; fi
          echo "→ knightcode --version"
          "$bin" --version
          echo "→ knightcode doctor"
          "$bin" doctor

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: packages/cli-${{ matrix.target }}/bin/
          if-no-files-found: error
          retention-days: 1

  # Reassemble the tested binaries into their package folders, validate the full
  # npm install path (pack-test), then publish every package Changesets considers
  # unpublished. Publishes the exact artifacts that passed the smoke tests.
  publish:
    needs: [version, build]
    if: needs.version.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Restore binaries into platform packages
        shell: bash
        run: |
          for dir in artifacts/cli-*; do
            target="${dir##*/cli-}"
            dest="packages/cli-${target}/bin"
            mkdir -p "$dest"
            cp -r "${dir}/." "$dest/"
          done
          # Artifact upload drops the mode bit; npm pack/publish reads it from
          # disk, so re-mark the POSIX binaries (not knightcode.exe) executable.
          chmod +x packages/cli-*/bin/knightcode 2>/dev/null || true
          ls -la packages/cli-*/bin

      - name: pack-test + publish
        run: bun run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release tags
        run: git push origin --tags

      # One clean GitHub Release per version for the main package (not the 5
      # platform packages). Body = the CHANGELOG.md section Changesets wrote.
      # Idempotent: skips if the release already exists (re-runs / no-op pushes).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          tag="@knightcodeai/cli@${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release for $tag already exists — nothing to do."
            exit 0
          fi
          notes=$(awk -v ver="$version" '
            $0 == "## " ver { flag = 1; next }
            /^## / && flag { exit }
            flag { print }
          ' packages/cli/CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="Release ${version}."
          fi
          printf '%s\n' "$notes" | gh release create "$tag" --title "v${version}" --notes-file -
